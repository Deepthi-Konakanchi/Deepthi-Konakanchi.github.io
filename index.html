<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastel Dreams</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="pastel-nav">
        <div class="container flex-nav">
            <span class="logo">✨ Sparkle</span>
            <div class="links">
                <a href="#">Gallery</a>
                <a href="#">Notes</a>
                <a href="#" class="btn-pill">Say Hello</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <section class="intro">
            <h1>Soft ideas, <br><span class="highlight">brightly</span> executed.</h1>
            <p>Welcome to a corner of the internet designed to be easy on the eyes.</p>
        </section>

        <section class="pastel-grid">
            <div class="p-card mint">
                <span>Creativity</span>
                <h3>The Art of Play</h3>
            </div>
            <div class="p-card lilac">
                <span>Curation</span>
                <h3>Color Palettes</h3>
            </div>
            <div class="p-card peach">
                <span>Design</span>
                <h3>Minimalist UI</h3>
            </div>
            <div class="p-card sky">
                <span>Strategy</span>
                <h3>Future Growth</h3>
            </div>
        </section>
    </main>

    <footer>
        <p>Made with 🌸 and GitHub Pages</p>
    </footer>

</body>
</html>
