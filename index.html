<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soft Studio | Creative Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader">
        <div class="scramble-wrapper">
            <h1 id="scramble-text">000000</h1>
        </div>
    </div>

    <div id="main-content">
        <nav>
            <div class="nav-content">
                <a href="#" class="logo">SOFT•STUDIO</a>
                <div class="nav-links">
                    <a href="#work">Work</a>
                    <a href="#" class="cta-pill">Contact</a>
                </div>
            </div>
        </nav>

        <main>
            <section class="hero">
                <h1 class="hero-text">
                    Creating <span class="blue-text">digital</span> <br> 
                    spaces that <span class="pink-text">breathe</span>.
                </h1>
            </section>

            <section class="grid-container" id="work">
                <div class="project-item project-sky">
                    <div class="project-preview"></div>
                    <div class="project-meta">
                        <h2>Cloud Archive</h2>
                        <p>Interface Design — 2026</p>
                    </div>
                </div>

                <div class="project-item project-peach">
                    <div class="project-preview"></div>
                    <div class="project-meta">
                        <h2>Sunset Series</h2>
                        <p>Editorial Motion</p>
                    </div>
                </div>

                <div class="project-item project-lilac">
                    <div class="project-preview"></div>
                    <div class="project-meta">
                        <h2>Dream Logic</h2>
                        <p>Brand Strategy</p>
                    </div>
                </div>

                <div class="project-item project-lemon">
                    <div class="project-preview"></div>
                    <div class="project-meta">
                        <h2>Bright Aura</h2>
                        <p>Visual Identity</p>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Soft Studio. All rights reserved.</p>
        </footer>
    </div>

    <script>
        const chars = "ABCDEFGHJKMNPQRSTUVWXY3456789#%&*+";
        const targetText = "STUDIO";
        const displayElement = document.getElementById("scramble-text");
        let iteration = 0;

        const interval = setInterval(() => {
            displayElement.innerText = targetText
                .split("")
                .map((letter, index) => {
                    if (index < iteration) return targetText[index];
                    return chars[Math.floor(Math.random() * chars.length)];
                })
                .join("");

            if (iteration >= targetText.length) {
                clearInterval(interval);
                setTimeout(() => {
                    document.body.classList.add("loaded");
                }, 600);
            }
            iteration += 1 / 3;
        }, 50);
    </script>
</body>
</html>
