<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastel Curator Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <div class="nav-content">
            <a href="#" class="logo">SOFT•STUDIO</a>
            <div class="nav-links">
                <a href="#work">Projects</a>
                <a href="#" class="cta-pill">Get in Touch</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero">
            <h1 class="hero-text">
                Creating <span class="blue-text">digital</span> <br> 
                spaces that <span class="pink-text">breathe</span>.
            </h1>
        </section>

        <section class="grid-container" id="work">
            <div class="project-item project-sky">
                <div class="project-preview"></div>
                <div class="project-meta">
                    <h2>Cloud Archive</h2>
                    <p>Interface Design — 2026</p>
                </div>
            </div>

            <div class="project-item project-peach">
                <div class="project-preview"></div>
                <div class="project-meta">
                    <h2>Sunset Series</h2>
                    <p>Editorial Motion</p>
                </div>
            </div>

            <div class="project-item project-lilac">
                <div class="project-preview"></div>
                <div class="project-meta">
                    <h2>Dream Logic</h2>
                    <p>Brand Strategy</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; Built with Softness on GitHub Pages</p>
    </footer>

</body>
</html>
